name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 #v2.9.1
        with:
          shared-key: "test-unit"
      - uses: taiki-e/install-action@e1c4cd42111751368541a7cb5db3522bd1f846a4 #2.78.0
        with:
          tool: cargo-llvm-cov@0.8.7
      - name: Run tests and generate coverage
        run: cargo llvm-cov --locked --no-default-features --features web --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: lcov.info

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 #v2.9.1
        with:
          shared-key: "lint"
      - run: rustup component add clippy rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --locked --no-deps --no-default-features --features web -- -D warnings

  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - uses: actions/download-artifact@v7
        with:
          name: coverage
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
